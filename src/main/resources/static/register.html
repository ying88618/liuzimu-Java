<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 · 登录测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        /* 标签页 */
        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            font-size: 16px;
            font-weight: 600;
            color: #999;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 6px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e1e5eb;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.3s;
            outline: none;
        }
        input:focus { border-color: #667eea; }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        button:hover { opacity: 0.9; }
        .result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            word-break: break-all;
        }
        .result.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
            display: block;
        }
        .result.error {
            background: #fce4ec;
            color: #c62828;
            border: 1px solid #f8bbd0;
            display: block;
        }
        .result.info {
            background: #e3f2fd;
            color: #1565c0;
            border: 1px solid #bbdefb;
            display: block;
        }
        .hint {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 标签页切换 -->
    <div class="tabs">
        <div class="tab active" onclick="switchTab('register')" id="tabRegister">注册</div>
        <div class="tab" onclick="switchTab('login')" id="tabLogin">登录</div>
    </div>

    <!-- 注册表单 -->
    <div id="registerForm">
        <div class="form-group">
            <label for="regUsername">用户名</label>
            <input type="text" id="regUsername" placeholder="5~16位，不能有空格" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="regPassword">密码</label>
            <input type="password" id="regPassword" placeholder="5~16位，不能有空格">
        </div>
        <button id="registerBtn" onclick="register()">注册</button>
    </div>

    <!-- 登录表单 -->
    <div id="loginForm" style="display:none;">
        <div class="form-group">
            <label for="loginUsername">用户名</label>
            <input type="text" id="loginUsername" placeholder="请输入用户名" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="loginPassword">密码</label>
            <input type="password" id="loginPassword" placeholder="请输入密码">
        </div>
        <button id="loginBtn" onclick="login()">登录</button>
    </div>

    <div id="result" class="result"></div>
    <div class="hint">测试页面 · POST /user/register ｜ POST /user/login</div>
</div>

<script>
    function switchTab(tab) {
        document.getElementById('tabRegister').className = tab === 'register' ? 'tab active' : 'tab';
        document.getElementById('tabLogin').className = tab === 'login' ? 'tab active' : 'tab';
        document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
        document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('result').className = 'result';
    }

    async function register() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value.trim();
        const response = await fetch('/user/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
        });
        const data = await response.json();
        const el = document.getElementById('result');
        el.textContent = data.code === 0 ? `✅ 注册成功！用户名: ${username}` : `❌ 注册失败：${data.message}`;
        el.className = 'result ' + (data.code === 0 ? 'success' : 'error');
    }

    async function login() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const response = await fetch('/user/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
        });
        const data = await response.json();
        const el = document.getElementById('result');
        el.textContent = data.code === 0 ? `✅ 登录成功！token: ${data.data}` : `❌ 登录失败：${data.message}`;
        el.className = 'result ' + (data.code === 0 ? 'success' : 'error');
    }
</script>
</body>
</html>
